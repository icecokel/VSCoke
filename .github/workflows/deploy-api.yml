name: Deploy API to Termux (Self-hosted Runner)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-termux
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, termux, vscoke-api]
    env:
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.icecoke.kr/api-json' }}
      DEPLOY_DIR: ${{ vars.API_DEPLOY_DIR || '/data/data/com.termux/files/home/projects/vscoke-api' }}
      TERMUX_HOME: /data/data/com.termux/files/home
      TERMUX_PREFIX: /data/data/com.termux/files/usr
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Termux runtime
        run: |
          echo "$TERMUX_PREFIX/bin" >> "$GITHUB_PATH"
          echo "HOME=$TERMUX_HOME" >> "$GITHUB_ENV"
          echo "PM2_HOME=$TERMUX_HOME/.pm2" >> "$GITHUB_ENV"

      - name: Verify self-hosted runner prerequisites
        run: |
          command -v node
          command -v corepack
          command -v pm2
          node --version
          pm2 --version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies and build API
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @vscoke/api build
          test -f apps/api/dist/src/main.js

      - name: Verify runtime env exists
        run: |
          DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
          mkdir -p "$DEPLOY_DIR"
          test -f "$DEPLOY_DIR/.env"

      - name: Stage production release
        run: |
          DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
          STAGE_DIR="$DEPLOY_DIR/.next-release"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR/apps/api"
          cp -R apps/api/dist "$STAGE_DIR/apps/api/dist"
          cp apps/api/package.json "$STAGE_DIR/apps/api/package.json"
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml "$STAGE_DIR/"
          cd "$STAGE_DIR"
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm install --filter @vscoke/api --prod --frozen-lockfile --ignore-scripts

      - name: Restart API with staged release
        run: |
          DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
          STAGE_DIR="$DEPLOY_DIR/.next-release"
          unset RUNNER_TRACKING_ID
          pm2 delete vscoke-api || true
          rm -rf "$DEPLOY_DIR/apps" "$DEPLOY_DIR/node_modules" "$DEPLOY_DIR/package.json" "$DEPLOY_DIR/pnpm-lock.yaml" "$DEPLOY_DIR/pnpm-workspace.yaml"
          cp -a "$STAGE_DIR"/. "$DEPLOY_DIR"/
          rm -rf "$STAGE_DIR"
          cd "$DEPLOY_DIR"
          pm2 start apps/api/dist/src/main.js --name vscoke-api --update-env
          pm2 save

      - name: Verify local API health on Termux
        run: |
          DEPLOY_DIR="${DEPLOY_DIR/#\~/$HOME}"
          cd "$DEPLOY_DIR"
          PORT="$(sed -n 's/^PORT=//p' .env | tail -1)"
          PORT="${PORT:-3000}"
          API_HEALTH_URL="http://127.0.0.1:${PORT}/api-json" \
            API_HEALTH_RETRIES=30 \
            API_HEALTH_RETRY_DELAY_MS=2000 \
            node "$GITHUB_WORKSPACE/scripts/check-api-health.mjs"

      - name: Verify public API health
        run: |
          pnpm smoke:api:remote
