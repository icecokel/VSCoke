name: Deploy API to Termux (Cloudflare Tunnel)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-termux
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: TERMUX
    env:
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.icecoke.kr/api-json' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies and build API
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @vscoke/api build
          tar -czf deploy-api.tar.gz apps/api/dist apps/api/package.json package.json pnpm-lock.yaml pnpm-workspace.yaml

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.TERMUX_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "Host ${{ secrets.TERMUX_HOST }}" >> ~/.ssh/config
          echo "  User ${{ secrets.TERMUX_USER }}" >> ~/.ssh/config
          echo "  IdentityFile ~/.ssh/id_rsa" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  ProxyCommand cloudflared access ssh --hostname %h" >> ~/.ssh/config

      - name: Prepare target directory
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "mkdir -p ~/projects/vscoke-api"

      - name: Verify runtime env exists
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "test -f ~/projects/vscoke-api/.env"

      - name: Stop app process
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "pm2 delete vscoke-api || true"
          sleep 5

      - name: Deploy archive
        run: |
          scp deploy-api.tar.gz ${{ secrets.TERMUX_HOST }}:~/projects/vscoke-api/

      - name: Extract, install production dependencies, and restart
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "cd ~/projects/vscoke-api && rm -rf apps package.json pnpm-lock.yaml pnpm-workspace.yaml && tar -xzf deploy-api.tar.gz && rm deploy-api.tar.gz && corepack enable && corepack prepare pnpm@9.12.0 --activate && pnpm install --filter @vscoke/api --prod --frozen-lockfile --ignore-scripts && pm2 start apps/api/dist/src/main.js --name vscoke-api --update-env && pm2 save"

      - name: Verify local API health on Termux
        run: |
          ssh ${{ secrets.TERMUX_HOST }} "cd ~/projects/vscoke-api && PORT=\$(sed -n 's/^PORT=//p' .env | tail -1) && PORT=\${PORT:-3000} && PORT=\$PORT node -e \"fetch('http://127.0.0.1:' + process.env.PORT + '/api-json').then((res) => { if (!res.ok) throw new Error('HTTP ' + res.status); }).catch((error) => { console.error(error); process.exit(1); })\""

      - name: Verify public API health
        run: |
          curl --fail --show-error --silent --retry 5 --retry-delay 5 "$API_HEALTH_URL" > /dev/null
