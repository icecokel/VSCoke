name: Pull Request Check

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://api.icecoke.kr

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API lint
        run: pnpm --filter @vscoke/api lint

      - name: Run API unit tests
        run: pnpm test:api

      - name: Run API E2E tests
        run: pnpm test:api:e2e

      - name: Build API
        run: pnpm build:api

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @vscoke/web exec playwright install --with-deps chromium

      - name: Run web type check
        run: pnpm type:check:web

      - name: Run web lint
        run: pnpm lint:web

      - name: Run unused code check
        run: pnpm knip

      - name: Build web
        run: pnpm build:web

      - name: Run focused web E2E tests
        run: pnpm --filter @vscoke/web e2e -- tests/e2e/i18n-integrity.spec.ts tests/e2e/hobby-games.spec.ts tests/e2e/keyboard-only.spec.ts --project=chromium
