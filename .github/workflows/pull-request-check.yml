name: Pull Request Check

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  NEXT_PUBLIC_API_URL: https://api.icecoke.kr

jobs:
  api:
    name: API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vscoke_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vscoke_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/vscoke_test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify shared package resolution
        run: pnpm check:poke-lounge-battle-resolution

      - name: Install pgvector in PostgreSQL service
        run: |
          docker exec "${{ job.services.postgres.id }}" sh -c '
            set -eu
            apt-get update
            apt-get install -y --no-install-recommends postgresql-16-pgvector
            rm -rf /var/lib/apt/lists/*
          '

      - name: Run API lint
        run: pnpm --filter @vscoke/api lint

      - name: Run API unit tests
        run: pnpm test:api

      - name: Build API
        run: pnpm build:api

      - name: Show API test migrations
        run: pnpm --filter @vscoke/api migration:show:test

      - name: Run API test migrations
        run: pnpm --filter @vscoke/api migration:run:test

      - name: Run API PostgreSQL integration and E2E tests
        run: pnpm test:api:e2e

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @vscoke/web exec playwright install --with-deps chromium

      - name: Verify local API contract types
        run: pnpm check:api-contract

      - name: Run web type check
        run: pnpm type:check:web

      - name: Run web lint
        run: pnpm lint:web

      - name: Run unused code check
        run: pnpm knip

      - name: Build web
        run: pnpm build:web

      - name: Verify Poke Lounge integration environment isolation
        run: node --test apps/web/scripts/playwright-integration-environment.test.mjs

      - name: Verify Poke Lounge mobile test collection
        run: |
          chromium_collection="$(pnpm --dir apps/web exec playwright test tests/e2e/poke-lounge-mobile.spec.ts --project=chromium-mobile-md --list)"
          printf '%s\n' "$chromium_collection"
          printf '%s\n' "$chromium_collection" | grep -Fq 'Total: 1 test in 1 file'

          webkit_collection="$(PLAYWRIGHT_ENABLE_CROSS_BROWSER=1 pnpm --dir apps/web exec playwright test tests/e2e/poke-lounge-mobile.spec.ts --project=webkit-mobile-lg --list)"
          printf '%s\n' "$webkit_collection"
          printf '%s\n' "$webkit_collection" | grep -Fq 'Total: 1 test in 1 file'

      - name: Verify Poke Lounge five-browser integration test collection
        run: |
          integration_collection="$(PLAYWRIGHT_ENABLE_CROSS_BROWSER=1 pnpm --dir apps/web exec playwright test tests/e2e/poke-lounge-five-player-tournament.spec.ts --project=poke-lounge-five-browser-integration --list)"
          printf '%s\n' "$integration_collection"
          printf '%s\n' "$integration_collection" | grep -Fq 'Total: 1 test in 1 file'

      - name: Run focused web E2E tests
        run: pnpm --filter @vscoke/web e2e -- tests/e2e/i18n-integrity.spec.ts tests/e2e/hobby-games.spec.ts tests/e2e/keyboard-only.spec.ts tests/e2e/poke-lounge-multiplayer.spec.ts --project=chromium
