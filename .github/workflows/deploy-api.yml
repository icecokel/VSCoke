name: Deploy API to Ubuntu Docker (Self-hosted Runner)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-docker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vscoke-api, docker]
    env:
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.icecoke.kr/health' }}
      API_IMAGE: ${{ vars.VSCOKE_API_IMAGE || 'icenux/vscoke-api:local' }}
      API_CONTAINER: ${{ vars.API_CONTAINER || 'icenux-docker-vscoke-api-1' }}
      API_LOOPBACK_CONTAINER: ${{ vars.API_LOOPBACK_CONTAINER || 'icenux-docker-vscoke-api-loopback' }}
      API_LOCAL_HEALTH_URL: ${{ vars.API_LOCAL_HEALTH_URL || 'http://127.0.0.1:3000/health' }}
      CLOUDFLARED_CONTAINER: ${{ vars.CLOUDFLARED_CONTAINER || 'icenux-docker-cloudflared-1' }}
      COMPOSE_DIR: ${{ vars.API_COMPOSE_DIR || '/workspace/docker' }}
      SSH_GATEWAY_CONTAINER: ${{ vars.SSH_GATEWAY_CONTAINER || 'icenux-docker-ssh-gateway-1' }}
      SSH_LOOPBACK_CONTAINER: ${{ vars.SSH_LOOPBACK_CONTAINER || 'icenux-docker-ssh-loopback' }}
      SSH_LOOPBACK_TARGET: ${{ vars.SSH_LOOPBACK_TARGET || 'host.docker.internal:1022' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify self-hosted runner prerequisites
        run: |
          command -v docker
          docker version
          docker compose version
          test -f "$COMPOSE_DIR/compose.yml"
          test -f "$COMPOSE_DIR/compose.local.yml"
          test -f "$COMPOSE_DIR/env/local.env"
          test -f "$COMPOSE_DIR/vscoke-api/Dockerfile"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate

      - name: Install dependencies and build API
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @vscoke/api build
          test -f apps/api/dist/src/main.js

      - name: Validate compose configuration
        run: |
          docker compose \
            --env-file "$COMPOSE_DIR/env/local.env" \
            -f "$COMPOSE_DIR/compose.yml" \
            -f "$COMPOSE_DIR/compose.local.yml" \
            config --quiet

      - name: Build API Docker image
        run: |
          docker build \
            --pull \
            --tag "$API_IMAGE" \
            --file "$COMPOSE_DIR/vscoke-api/Dockerfile" \
            "$GITHUB_WORKSPACE"

      - name: Restart API with Docker Compose
        run: |
          docker compose \
            --env-file "$COMPOSE_DIR/env/local.env" \
            -f "$COMPOSE_DIR/compose.yml" \
            -f "$COMPOSE_DIR/compose.local.yml" \
            up -d --no-build postgres
          docker compose \
            --env-file "$COMPOSE_DIR/env/local.env" \
            -f "$COMPOSE_DIR/compose.yml" \
            -f "$COMPOSE_DIR/compose.local.yml" \
            up -d --no-deps --force-recreate --no-build vscoke-api
          docker compose \
            --env-file "$COMPOSE_DIR/env/local.env" \
            -f "$COMPOSE_DIR/compose.yml" \
            -f "$COMPOSE_DIR/compose.local.yml" \
            ps postgres vscoke-api

      - name: Verify local API health
        run: |
          for attempt in $(seq 1 30); do
            if docker exec -i -e API_LOCAL_HEALTH_URL="$API_LOCAL_HEALTH_URL" "$API_CONTAINER" node - <<'NODE'
          (async () => {
            const response = await fetch(process.env.API_LOCAL_HEALTH_URL);
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const payload = await response.json();
            if (payload?.success !== true || payload?.data?.status !== 'ok') {
              throw new Error(`Unexpected health payload: ${JSON.stringify(payload)}`);
            }
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
            then
              exit 0
            fi

            sleep 2
          done

          exit 1

      - name: Ensure public tunnel routes API
        run: |
          docker compose \
            --env-file "$COMPOSE_DIR/env/local.env" \
            -f "$COMPOSE_DIR/compose.yml" \
            -f "$COMPOSE_DIR/compose.local.yml" \
            up -d cloudflared

          ssh_probe="$(docker run --rm --network "container:$CLOUDFLARED_CONTAINER" curlimages/curl:latest \
            -sS --max-time 5 "telnet://$SSH_LOOPBACK_TARGET" 2>&1 || true)"

          if printf '%s' "$ssh_probe" | grep -q 'SSH-'; then
            docker rm -f "$SSH_GATEWAY_CONTAINER" >/dev/null 2>&1 || true

            if docker ps -a --format '{{.Names}}' | grep -Fxq "$SSH_LOOPBACK_CONTAINER"; then
              docker rm -f "$SSH_LOOPBACK_CONTAINER"
            fi

            docker run -d \
              --name "$SSH_LOOPBACK_CONTAINER" \
              --restart unless-stopped \
              --network "container:$CLOUDFLARED_CONTAINER" \
              alpine/socat:latest \
              tcp-listen:1022,fork,reuseaddr \
              "tcp-connect:$SSH_LOOPBACK_TARGET"
          else
            printf '%s\n' "$ssh_probe"
            docker compose \
              --env-file "$COMPOSE_DIR/env/local.env" \
              -f "$COMPOSE_DIR/compose.yml" \
              -f "$COMPOSE_DIR/compose.local.yml" \
              up -d ssh-gateway
          fi

          if docker ps -a --format '{{.Names}}' | grep -Fxq "$API_LOOPBACK_CONTAINER"; then
            docker rm -f "$API_LOOPBACK_CONTAINER"
          fi

          docker run -d \
            --name "$API_LOOPBACK_CONTAINER" \
            --restart unless-stopped \
            --network "container:$CLOUDFLARED_CONTAINER" \
            alpine/socat:latest \
            tcp-listen:3000,fork,reuseaddr \
            tcp-connect:vscoke-api:3000

          for attempt in $(seq 1 15); do
            if docker run --rm --network "container:$CLOUDFLARED_CONTAINER" curlimages/curl:latest \
              -fsS http://127.0.0.1:3000/health >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          exit 1

      - name: Verify public API health
        run: |
          API_HEALTH_URL="$API_HEALTH_URL" \
            API_HEALTH_RETRIES=30 \
            API_HEALTH_RETRY_DELAY_MS=2000 \
            node scripts/check-api-health.mjs
