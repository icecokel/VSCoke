name: Deploy API to Ubuntu Host (Self-hosted Runner)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "apps/api/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api-host
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, vscoke-api, host]
    env:
      API_DEPLOY_DIR: ${{ vars.API_DEPLOY_DIR || '/home/icenux/projects/vscoke-api' }}
      API_HEALTH_URL: ${{ vars.API_HEALTH_URL || 'https://api.icecoke.kr/health' }}
      API_LOCAL_HEALTH_URL: ${{ vars.API_LOCAL_HEALTH_URL || 'http://127.0.0.1:3000/health' }}
      API_PROCESS_NAME: ${{ vars.API_PROCESS_NAME || 'vscoke-api' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify self-hosted runner prerequisites
        run: |
          command -v node
          command -v corepack
          command -v pnpm || true
          command -v pm2
          command -v psql
          command -v rsync
          test -d "$API_DEPLOY_DIR"
          test -f "$API_DEPLOY_DIR/.env"
          node --version
          pm2 --version
          psql --version

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install dependencies and build API
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @vscoke/api build
          test -f apps/api/dist/src/main.js

      - name: Create staged release
        run: |
          RELEASE_DIR="$API_DEPLOY_DIR/.next-release"
          rm -rf "$RELEASE_DIR"
          mkdir -p "$RELEASE_DIR/apps/api"

          rsync -a apps/api/dist "$RELEASE_DIR/apps/api/"
          cp apps/api/package.json "$RELEASE_DIR/apps/api/package.json"
          cp package.json pnpm-lock.yaml pnpm-workspace.yaml "$RELEASE_DIR/"

          cd "$RELEASE_DIR"
          pnpm --filter @vscoke/api install --prod --frozen-lockfile --ignore-scripts
          test -f apps/api/dist/src/main.js
          test -f apps/api/package.json

      - name: Promote release
        run: |
          RELEASE_DIR="$API_DEPLOY_DIR/.next-release"
          test -f "$RELEASE_DIR/apps/api/dist/src/main.js"

          rsync -a --delete \
            --exclude '.env' \
            --exclude '.next-release' \
            --exclude 'backups' \
            "$RELEASE_DIR"/ \
            "$API_DEPLOY_DIR"/

      - name: Restart API with PM2
        run: |
          if systemctl list-unit-files vscoke-api-local-proxy.service >/dev/null 2>&1; then
            sudo systemctl disable --now vscoke-api-local-proxy.service || true
          fi

          cd "$API_DEPLOY_DIR"
          set -a
          . ./.env
          set +a

          pm2 delete "$API_PROCESS_NAME" || true
          pm2 start apps/api/dist/src/main.js --name "$API_PROCESS_NAME" --update-env
          pm2 save
          pm2 status "$API_PROCESS_NAME"

      - name: Verify local API health
        run: |
          for attempt in $(seq 1 30); do
            if node - <<'NODE'
          (async () => {
            const response = await fetch(process.env.API_LOCAL_HEALTH_URL);
            if (!response.ok) {
              throw new Error(`HTTP ${response.status}`);
            }

            const payload = await response.json();
            if (payload?.success !== true || payload?.data?.status !== 'ok') {
              throw new Error(`Unexpected health payload: ${JSON.stringify(payload)}`);
            }
          })().catch((error) => {
            console.error(error.message);
            process.exit(1);
          });
          NODE
            then
              exit 0
            fi

            sleep 2
          done

          exit 1

      - name: Verify public API health
        run: |
          API_HEALTH_URL="$API_HEALTH_URL" \
            API_HEALTH_RETRIES=30 \
            API_HEALTH_RETRY_DELAY_MS=2000 \
            node scripts/check-api-health.mjs
